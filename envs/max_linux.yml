# Linux `max` conda environment — regenerated from this machine's `/shared/b00090279/max_env`
# pip pins = full `pip list --format=freeze` union (reproducible on another Linux host with same Miniconda/Mamba + channels).
#
# Create:
#   conda env create -f envs/max_linux.yml -n max
#   conda activate max
#
# Notes:
# - Channels: conda-forge first (graphviz + binary stack), then defaults.
# - `appnope` is macOS-only; kept as a PEP 508 marker for parity with Mac lockfiles.
# - If `conda env create` fails on NFS with `.condatmp` errors, use local temp, e.g.:
#     export CONDA_TMPDIR=$HOME/.conda/tmp && mkdir -p "$CONDA_TMPDIR"
# - Pip-only install: sync `requirements.txt` `pip:` block with this file (or generate from freeze).
#
name: max
# PyTorch 2.2.2 + CUDA 12.x wheels ship via pip; numpy 1.26.x stays TF-friendly if you add TF later.
