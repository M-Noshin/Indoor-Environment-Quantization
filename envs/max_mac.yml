# macOS `max` conda environment — regenerated from this machine's active `conda activate max`
# Platform of source env: macOS x86_64, Python 3.11.13
# pip pins = full `pip list --format=freeze` from the source env.
#
# Create:
#   conda env create -f envs/max_mac.yml -n max
#   conda activate max
#
# Notes:
# - This is intended to reproduce the current macOS `max` env on another Mac.
# - Because the source env is x86_64, the closest match is another Intel Mac, or Apple Silicon
#   running an x86_64/Rosetta Conda install. A native arm64 Mac may need a separate lockfile.
# - The conda layer is kept minimal (`python` + `pip`); the package lock lives in the `pip:` block.
# - If `conda env create` fails on temp-dir or permission issues, use a local temp dir, e.g.:
#     export CONDA_TMPDIR="$HOME/.conda/tmp" && mkdir -p "$CONDA_TMPDIR"
#
