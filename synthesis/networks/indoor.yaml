---
# YAML template -- requires manual editing, particularly with regard to out_offset and processors
# Generated for MAX78002 with input format HWC

arch: ai85indoorenvnetv1
dataset: IndoorEnvironment

layers:
  # Layer 0
  - name: conv1_Conv_10  # conv1_Conv_10 fused with conv1.activate
    # input shape: (101, 2)
    data_format: HWC
    in_dim: [101, 2]
    processors: 0x0000000000000001
    out_offset: 0x2000
    op: Conv2d
    kernel_size: 3x3
    pad: 1
    activate: ReLU
    # output shape: (5, 101, 2)

  # Layer 1
  - name: conv2_Conv_8  # conv2_Conv_8 fused with conv2.activate
    # input shape: (5, 101, 2)
    processors: 0x000000000000001f
    output_processors: 0x000000000000001f
    out_offset: 0x0000
    op: Conv2d
    kernel_size: 3x3
    pad: 1
    activate: ReLU
    # output shape: (5, 101, 2)

  # Layer 2
  - name: fc1_Gemm_8  # fc1_Gemm_8 fused with fc1.activate
    # input shape: (5, 101, 2)
    processors: 0x000000000000001f
    output_processors: 0x0003ffffffffffff
    out_offset: 0x2000
    op: Linear
    flatten: true
    activate: ReLU
    # output shape: (50,)

  # Layer 3
  - name: fc2_Gemm_8
    # input shape: (50,)
    processors: 0x0003ffffffffffff
    out_offset: 0x0000
    op: Linear
    activate: None
    # output shape: (4,)
