---
# Indoor Environment CTF Classification Network for MAX78000
# Author: Hamza

arch: ai85indoorenvnetv1

dataset: IndoorEnvironment

layers:
  # Layer 0: Conv1 : (in_ch=1, out_ch=5) 3x3
  - pad: 1
    activate: ReLU
    out_offset: 0x2000
    processors: 0x0000000000000001
    data_format: HWC  # rows (height), columns (width), channels (depth)
    operation: conv2d
    kernel_size: 3x3

  # Layer 1: Conv2 : (in_ch=5, out_ch=5) 3x3
  - pad: 1
    activate: ReLU
    out_offset: 0x0000
    processors: 0x000000000000001f
    output_processors: 0x000000000000001f
    operation: conv2d
    kernel_size: 3x3

  # Layer 2: Flatten + FC1 : 1010 -> 50 (hardware uses output_width: 8 for intermediate)
  - flatten: true
    out_offset: 0x2000
    processors: 0x000000000000001f
    output_processors: 0x0003ffffffffffff
    operation: MLP
    output_width: 8
    activate: ReLU

  # Layer 3: FC2 : 50 -> 4 classes (hardware uses output_width: 32 for final layer)
  - out_offset: 0x0000
    processors: 0x0003ffffffffffff
    operation: MLP
    output_width: 32
    activate: None
